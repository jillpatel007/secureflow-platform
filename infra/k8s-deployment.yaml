apiVersion: apps/v1
kind: Deployment
metadata:
  name: secureflow-api
  namespace: secureflow
  labels:
    app: secureflow-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: secureflow-api
  template:
    metadata:
      labels:
        app: secureflow-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: secureflow-api
          image: secureflow-api:0.1.0
          ports:
            - containerPort: 8000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
