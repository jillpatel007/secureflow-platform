apiVersion: v1
kind: ServiceAccount
metadata:
  name: secureflow-sa
  namespace: secureflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secureflow-role
  namespace: secureflow
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secureflow-rolebinding
  namespace: secureflow
subjects:
  - kind: ServiceAccount
    name: secureflow-sa
    namespace: secureflow
roleRef:
  kind: Role
  name: secureflow-role
  apiGroup: rbac.authorization.k8s.io
